<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAKUROUO / がくろうお</title>
  <style>
  /* === index.css（旧外部ファイル） === */
  img { border: 0; }

  body {
    font-family: osaka, arial;
    background-image: url(bg/main.gif);
    overflow-x: hidden;
  }

  a:link    { text-decoration: none; color: #006666; }
  a:visited { text-decoration: none; color: #0099cc; }
  a:active  { text-decoration: none; color: #006666; }
  a:hover   { text-decoration: none; color: #ff0000; }

  /* === レスポンシブ対応 === */
  *, *::before, *::after { box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .site-wrap {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .site-title img {
    max-width: 100%;
    height: auto;
  }

  .site-main {
    width: 100%;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 32px;
  }

  .site-photos {
    flex: 0 0 50%;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  .site-photos a { display: block; }
  .site-photos img {
    max-width: 100%;
    height: auto;
    display: block;
  }

  .site-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: flex-start;
  }

  .site-nav a {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 18px;
    text-decoration: none;
    color: #006666;
  }

  .site-nav a img {
    width: 40px;
    height: auto;
    flex-shrink: 0;
  }

  .site-footer {
    font-size: 11px;
    color: #666;
    text-align: center;
    line-height: 1.8;
  }

  @media (max-width: 560px) {
    body {
      justify-content: flex-start;
      padding: 32px 16px 48px;
    }
    .site-main {
      flex-direction: column;
      gap: 28px;
    }
    .site-photos {
      flex: none;
      width: 100%;
    }
    .site-nav {
      width: 100%;
      align-items: center;
      gap: 20px;
    }
    .site-nav a { font-size: 20px; }
  }
  </style>
  <script>
  /* === index.js（旧外部ファイル）：画像プリロード === */
  var clickimg = new Array();
  clickimg[1] = new Image(); clickimg[1].src = "pic/black_fish_02.gif";
  clickimg[2] = new Image(); clickimg[2].src = "pic/black_fish_08.gif";
  clickimg[3] = new Image(); clickimg[3].src = "pic/black_fish_04.gif";
  clickimg[4] = new Image(); clickimg[4].src = "pic/black_fish_08.gif";
  </script>
</head>

<body>
<div class="site-wrap">

  <div class="site-title">
    <img src="ltr/gakurouo020712.gif" alt="GAKUROUO / がくろうお">
  </div>

  <div class="site-main">

    <div class="site-photos">
      <a href="pht/napoli.html">
        <img src="pht/title/napoli.jpg" alt="ナポリ">
      </a>
    </div>

    <nav class="site-nav">
      <a href="manifesto.html"
         onmouseover="document.getElementById('img-mani').src='pic/black_fish_02.gif'"
         onmouseout="document.getElementById('img-mani').src='pic/black_fish_01.gif'">
        <img id="img-mani" src="pic/black_fish_01.gif" alt="">
        MANIFESTO
      </a>
      <a href="photos.html"
         onmouseover="document.getElementById('img-photos').src='pic/black_fish_04.gif'"
         onmouseout="document.getElementById('img-photos').src='pic/black_fish_03.gif'">
        <img id="img-photos" src="pic/black_fish_03.gif" alt="">
        PHOTOS
      </a>
    </nav>

  </div>

  <footer class="site-footer">
    All Rights Reserved. (c) gakurouo, since 2000<br>
    <script>
    var hiduke = new Date(document.lastModified);
    document.write("Last Updated: " + hiduke.getFullYear() + "/" + (hiduke.getMonth()+1) + "/" + hiduke.getDate());
    </script>
  </footer>

</div>
</body>

</html>
